# Home Datacenter API configuration
#
# Path resolution:
#   - Default lookup: configs/config.yaml (relative to CWD)
#   - Override via APP_CONFIG env var
#
# In Docker (WORKDIR /), this resolves to /configs/config.yaml,
# which is both baked into the image and bind-mounted by compose.yaml.
#
# SECURITY: the jwt.secret value here is a PLACEHOLDER only. The app
# refuses to start with this value (see internal/config/config.go ->
# validateJWTSecret). Set a real 32+ char secret via one of:
#   1. configs/config.local.yaml (gitignored — local dev)
#   2. the JWT_SECRET environment variable (preferred for Docker)
# Generate with: openssl rand -hex 32

server:
  port: 8080
  # Restrict which hostnames may open a WebSocket against /api/v1/ws.
  # Empty list = allow all (local dev). In production, list the
  # dashboard hostname(s) to block cross-site WebSocket hijacking.
  # allowed_origins:
  #   - dashboard.feiyemomo.top

database:
  path: /data/sqlite/app.db

jwt:
  secret: your-secret-key
  expire_days: 365

# Phase 3: MQTT broker (Mosquitto)
mqtt:
  broker: tcp://mosquitto:1883
  client_id: home-datacenter
  username: ""
  password: ""
  qos: 1

# Phase 3: WebSocket real-time push
websocket:
  path: /api/v1/ws
  heartbeat_seconds: 30

# Phase 4: Camera platformization
# go2rtc is reached by its Docker service name on the home-net
# network. Override with GO2RTC_BASE_URL env var if the address
# differs (e.g. local dev with a host-installed go2rtc on :1984).
go2rtc:
  base_url: http://home-go2rtc:1984

camera:
  # How often to TCP-probe each camera's RTSP port.
  health_interval_seconds: 15
  # Per-probe dial timeout.
  health_timeout_seconds: 3
  # Recording root. Must be a path that BOTH home-api and
  # home-go2rtc can see — i.e. a shared volume mounted at the same
  # location in both. Default /data/recordings assumes the bind
  # mount in compose.yaml.
  recording_dir: /data/recordings
  # WebRTC public base URL. Three modes:
  #   ""                       → LAN-only (returns the in-network
  #                              go2rtc URL, e.g. http://home-go2rtc:1984;
  #                              browsers outside Docker can't resolve it)
  #   "/go2rtc"                → reverse-proxied through the dashboard
  #                              nginx (location /go2rtc/ → home-go2rtc:1984).
  #                              Same-origin → no CORS, recommended default.
  #   "https://cam.example.com"→ separate Cloudflare Tunnel hostname
  webrtc_public_base: "/go2rtc"
  # ICE servers (STUN/TURN) returned to browsers. JSON array, e.g.:
  #   ice_servers: '[{"urls":"stun:stun.cloudflare.com:3478"},
  #                   {"urls":"turn:turn.example.com:3478",
  #                    "username":"x","credential":"y"}]'
  ice_servers: ""
