# Home Datacenter API configuration
#
# Path resolution:
#   - Default lookup: configs/config.yaml (relative to CWD)
#   - Override via APP_CONFIG env var
#
# In Docker (WORKDIR /), this resolves to /configs/config.yaml,
# which is both baked into the image and bind-mounted by compose.yaml.

server:
  port: 8080

database:
  path: /data/sqlite/app.db

jwt:
  secret: your-secret-key
  expire_days: 365
