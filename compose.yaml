# Home Datacenter — Docker Compose
#
# Three services: api (Go), mosquitto (MQTT broker), web (nginx SPA).
# All secrets come from the .env file loaded by compose (see
# .env.example). No secret material is committed to this repo.
#
# Network posture:
#   - Only ports 80 (web) and 8080 (api) are published to the host,
#     and only for local dev. In production behind Cloudflare Tunnel
#     you can stop publishing 8080 — the tunnel reaches the api
#     service on the internal Docker network by name (home-api).
#   - Mosquitto port 1883 is NOT published to the host by default;
#     the api reaches it on the internal network as "mosquitto:1883".
#     Set MQTT_BIND_PORT below if you need host access for local
#     device testing.

services:
  api:
    build:
      context: ./services/api
    container_name: home-api
    restart: unless-stopped
    # Default-bind to localhost only. Override with MQTT/HTTP ports
    # for local testing; in production behind the tunnel, prefer not
    # publishing the API port at all and letting the tunnel reach it
    # by service name.
    ports:
      - "127.0.0.1:8080:8080"
      # Publish on IPv6 so clients can connect directly via
      # http://[host-ipv6]:8080 — bypasses Cloudflare Tunnel relay.
      - ":::8080:8080"
    volumes:
      - ./data/sqlite:/data/sqlite
      - ./services/api/configs:/configs:ro
    depends_on:
      mosquitto:
        condition: service_started
      frigate:
        condition: service_healthy
    environment:
      - APP_CONFIG=${APP_CONFIG:-/configs/config.yaml}
      # Secret material via env (preferred). See .env.example.
      - JWT_SECRET=${JWT_SECRET:-}
      - MQTT_USERNAME=${MQTT_USERNAME:-home-datacenter}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - GO2RTC_BASE_URL=${GO2RTC_BASE_URL:-http://home-frigate:1984}
      - FRIGATE_BASE_URL=${FRIGATE_BASE_URL:-http://home-frigate:5000}
    networks:
      - home-net

  mosquitto:
    image: docker.m.daocloud.io/library/eclipse-mosquitto:2
    container_name: home-mosquitto
    restart: unless-stopped
    # Not published by default. Uncomment and set MQTT_BIND_PORT only
    # if a local physical device needs to reach the broker from the host.
    # ports:
    #   - "127.0.0.1:${MQTT_BIND_PORT:-1883}:1883"
    entrypoint: [ "/mosquitto/config/docker-entrypoint.sh" ]
    volumes:
      - ./deploy/mosquitto/docker-entrypoint.sh:/mosquitto/config/docker-entrypoint.sh:ro
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./deploy/mosquitto/aclfile:/mosquitto/config/aclfile:ro
      - ./deploy/mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./data/mosquitto:/mosquitto/data
    networks:
      - home-net

  web:
    build:
      context: ./web
    container_name: home-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
      # Publish on IPv6 so mobile devices can access the dashboard
      # directly via http://[host-ipv6]/ — HTTP (no mixed content),
      # so the IPv6 Direct Probe works in the browser.
      - ":::80:80"
    depends_on:
      - api
    networks:
      - home-net

  # frigate — NVR with built-in go2rtc, AI object detection,
  # and recording. Replaces the standalone go2rtc container.
  #
  # Frigate bundles go2rtc internally on port 1984 (same API as the
  # standalone container). The Frigate REST API is on port 5000.
  # home-api pushes camera config to Frigate via PUT /api/config/save
  # so the AI detection pipeline knows about each camera.
  #
  # Ports:
  #   1984 — bundled go2rtc HTTP API (stream management, SDP, HLS)
  #   5000 — Frigate REST API (config, events, snapshots)
  #   8555 — WebRTC media (TCP ICE + UDP ICE, same as standalone go2rtc)
  #
  # SET_CONFIG_BY_API=true enables the PUT /api/config/save endpoint
  # so home-api can push camera definitions dynamically.
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: home-frigate
    restart: unless-stopped
    environment:
      - SET_CONFIG_BY_API=true
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD:-}
    ports:
      # Frigate REST API (config, events, snapshots)
      - "127.0.0.1:5000:5000"
      # Bundled go2rtc HTTP API (HLS, WebRTC SDP signalling)
      - "127.0.0.1:1984:1984"
      # WebRTC media: TCP ICE + UDP ICE. Browser needs direct
      # access for ICE connectivity checks.
      - "8555:8555"
      - "8555:8555/udp"
    volumes:
      - ./deploy/frigate/config.yml:/config/config.yml
      - ./data/frigate:/media/frigate
      - ./data/recordings:/recordings
    # Intel GPU (UHD Graphics 600) passthrough for VAAPI hardware
    # decoding. /dev/dri/renderD128 is the compute-only render node
    # — safer than /dev/dri/card0 which grants display privileges.
    # On fnOS (Linux) this works out of the box. On Docker Desktop
    # (Windows/WSL2), GPU passthrough is not supported — uncomment
    # the line below and remove `ffmpeg.hwaccel_args` from the
    # Frigate config to fall back to software decoding.
    devices:
      - /dev/dri:/dev/dri
    # Healthcheck: check the Frigate REST API is responding.
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5000/api/config" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - home-net
  # cloudflared — Cloudflare Tunnel connector. Routes public
  # hostnames (dashboard / api / cam .feiyemomo.top) to the
  # internal Docker services via the home-net bridge network.
  # The tunnel ID and credentials are mounted from the host's
  # ~/.cloudflared directory; the ingress rules live in
  # deploy/cloudflared/config.yaml.
  cloudflared:
    image: docker.m.daocloud.io/cloudflare/cloudflared:latest
    container_name: home-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yaml run
    volumes:
      - ./deploy/cloudflared/config.yaml:/etc/cloudflared/config.yaml:ro
      # Mount the credentials JSON from the host. On Windows the
      # path is C:\Users\<user>\.cloudflared\<tunnel-id>.json.
      - ${USERPROFILE}/.cloudflared/663e45da-2140-4b42-8dbc-b65da7b5956a.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - web
      - api
      - frigate
    networks:
      - home-net
  # coturn — optional STUN/TURN for WebRTC across the public
  # internet. Without this, browsers can only reach go2rtc via
  # LAN or Cloudflare Tunnel (HTTP SDP only — no UDP media).
  # Disabled by default; uncomment the block below to enable.
  #
  #   coturn:
  #     build: ./deploy/coturn
  #     container_name: home-coturn
  #     restart: unless-stopped
  #     ports:
  #       - "3478:3478/udp"      # STUN/TURN UDP
  #       - "3478:3478"          # STUN/TURN TCP (fallback)
  #       - "5349:5349"          # TURN over TLS
  #       - "49160-49200:49160-49200/udp"  # relay
  #     networks:
  #       - home-net

networks:
  home-net:
    driver: bridge
    # Enable IPv6 on the Docker bridge network so containers have
    # outbound IPv6 connectivity. Requires "Enable IPv6" in Docker
    # Desktop settings (Settings → Resources → Network). The ULA subnet
    # is Docker-internal; Docker NATs outbound IPv6 to the host's public
    # address. The api's CheckIPv6() discovers the public address via
    # an external echo service, so clients get the right endpoint.
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.19.0.0/16
        - subnet: fd00:dead:beef::/64
