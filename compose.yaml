# Home Datacenter — Docker Compose
#
# Three services: api (Go), mosquitto (MQTT broker), web (nginx SPA).
# All secrets come from the .env file loaded by compose (see
# .env.example). No secret material is committed to this repo.
#
# Network posture:
#   - Only ports 80 (web) and 8080 (api) are published to the host,
#     and only for local dev. In production behind Cloudflare Tunnel
#     you can stop publishing 8080 — the tunnel reaches the api
#     service on the internal Docker network by name (home-api).
#   - Mosquitto port 1883 is NOT published to the host by default;
#     the api reaches it on the internal network as "mosquitto:1883".
#     Set MQTT_BIND_PORT below if you need host access for local
#     device testing.

services:
  api:
    build:
      context: ./services/api
    container_name: home-api
    restart: unless-stopped
    # Default-bind to localhost only. Override with MQTT/HTTP ports
    # for local testing; in production behind the tunnel, prefer not
    # publishing the API port at all and letting the tunnel reach it
    # by service name.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data/sqlite:/data/sqlite
      - ./services/api/configs:/configs:ro
    depends_on:
      mosquitto:
        condition: service_started
      go2rtc:
        condition: service_healthy
    environment:
      - APP_CONFIG=${APP_CONFIG:-/configs/config.yaml}
      # Secret material via env (preferred). See .env.example.
      - JWT_SECRET=${JWT_SECRET:-}
      - MQTT_USERNAME=${MQTT_USERNAME:-home-datacenter}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - GO2RTC_BASE_URL=${GO2RTC_BASE_URL:-http://home-go2rtc:1984}
    networks:
      - home-net

  mosquitto:
    image: docker.m.daocloud.io/library/eclipse-mosquitto:2
    container_name: home-mosquitto
    restart: unless-stopped
    # Not published by default. Uncomment and set MQTT_BIND_PORT only
    # if a local physical device needs to reach the broker from the host.
    # ports:
    #   - "127.0.0.1:${MQTT_BIND_PORT:-1883}:1883"
    entrypoint: [ "/mosquitto/config/docker-entrypoint.sh" ]
    volumes:
      - ./deploy/mosquitto/docker-entrypoint.sh:/mosquitto/config/docker-entrypoint.sh:ro
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./deploy/mosquitto/aclfile:/mosquitto/config/aclfile:ro
      - ./deploy/mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./data/mosquitto:/mosquitto/data
    networks:
      - home-net

  web:
    build:
      context: ./web
    container_name: home-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - api
    networks:
      - home-net

  # go2rtc — RTSP → WebRTC/HLS bridge.
  # The API pushes stream definitions to it at runtime; this
  # container just serves what it's told. Port 1984 is bound to
  # the loopback only — the only path in is via Cloudflare Tunnel
  # (or your LAN via a manually mapped port).
  #
  # IMPORTANT: go2rtc.yaml is NOT bind-mounted. The Dockerfile
  # COPYs it into the image at /etc/go2rtc.yaml, and go2rtc rewrites
  # that file on every PUT /api/streams call (it persists in-memory
  # streams to disk for next-boot replay). A bind-mounted file —
  # especially on Windows / Docker Desktop — can be read-only at
  # the filesystem level even without the :ro flag, causing the
  # write to fail silently: the API returns 200 but the stream is
  # never added. By relying on the Dockerfile COPY the file lives
  # in the container's writable layer and go2rtc can save freely.
  # The DB remains the source of truth on container restart;
  # home-api's BootReplay re-injects all persisted streams.
  go2rtc:
    build:
      context: ./deploy/go2rtc
    container_name: home-go2rtc
    restart: unless-stopped
    ports:
      # HTTP API + WebRTC SDP signalling (proxied via dashboard nginx)
      - "127.0.0.1:1984:1984"
      # WebRTC media: TCP ICE + UDP ICE on a single port. Browser
      # needs direct access for ICE connectivity checks. For LAN
      # access from other devices, change 127.0.0.1 to 0.0.0.0.
      - "127.0.0.1:8555:8555"
      - "127.0.0.1:8555:8555/udp"
    volumes:
      - ./data/go2rtc:/var/lib/go2rtc
    # Healthcheck so dependent services (api) wait for the HTTP API
    # to actually be ready, not just for the container to start.
    # Without this, the API's BootReplay runs before go2rtc accepts
    # connections and silently fails to register any stream.
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:1984/api/streams" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    networks:
      - home-net
  # coturn — optional STUN/TURN for WebRTC across the public
  # internet. Without this, browsers can only reach go2rtc via
  # LAN or Cloudflare Tunnel (HTTP SDP only — no UDP media).
  # Disabled by default; uncomment the block below to enable.
  #
  #   coturn:
  #     build: ./deploy/coturn
  #     container_name: home-coturn
  #     restart: unless-stopped
  #     ports:
  #       - "3478:3478/udp"      # STUN/TURN UDP
  #       - "3478:3478"          # STUN/TURN TCP (fallback)
  #       - "5349:5349"          # TURN over TLS
  #       - "49160-49200:49160-49200/udp"  # relay
  #     networks:
  #       - home-net

networks:
  home-net:
    driver: bridge
