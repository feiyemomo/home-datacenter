# Mosquitto broker configuration for Home Datacenter.
#
# - Listens on port 1883 (plain TCP, internal Docker network only).
# - Anonymous access allowed (the broker is not exposed externally;
#   Cloudflare Tunnel only fronts the HTTP API, not MQTT).
# - Persistence enabled so subscriptions survive restarts.

listener 1883

allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
