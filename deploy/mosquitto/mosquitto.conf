# Mosquitto broker configuration for Home Datacenter.
#
# - Listens on port 1883 (plain TCP, internal Docker network only).
# - Anonymous access is DISABLED. The API server authenticates with
#   the home-datacenter account (password from MQTT_PASSWORD env).
# - Per-listener ACLs restrict what the API client can do.
# - The broker is not exposed externally; Cloudflare Tunnel only
#   fronts the HTTP API, not MQTT.
# - Persistence enabled so subscriptions survive restarts.

listener 1883

# Require authentication. Anonymous clients are rejected.
allow_anonymous false

# Password file (bind-mounted from deploy/mosquitto/passwd).
# Generate with: docker exec home-mosquitto mosquitto_passwd -c /mosquitto/config/passwd home-datacenter
# (or use mosquitto_passwd locally). The file must be readable by
# the mosquitto user; it is bind-mounted read-only.
password_file /mosquitto/config/passwd

# ACL: the API server may publish to any home-datacenter/ topic and
# subscribe to device telemetry/status. Other (device) clients should
# get their own ACL entries when they are added.
acl_file /mosquitto/config/aclfile

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
