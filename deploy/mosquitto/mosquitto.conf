# Mosquitto broker configuration for Home Datacenter.
#
# - Listens on port 1883 (plain TCP, internal Docker network only).
# - Anonymous access is DISABLED. The API server authenticates with
#   the home-datacenter account (password from MQTT_PASSWORD env).
# - Per-listener ACLs restrict what the API client can do.
# - The broker is not exposed externally; Cloudflare Tunnel only
#   fronts the HTTP API, not MQTT.
# - Persistence enabled so subscriptions survive restarts.

listener 1883

# Require authentication. Anonymous clients are rejected.
allow_anonymous false

# Password file: generated offline and bind-mounted into the container
# as /mosquitto/config/passwd. The entrypoint copies it to
# /mosquitto/data/passwd with strict permissions because Mosquitto 2.x
# refuses to load world-readable password files.
# Generate with: docker run --rm -v "./deploy/mosquitto:/work" \
#   eclipse-mosquitto:2 mosquitto_passwd -c -b /work/passwd home-datacenter <password>
password_file /mosquitto/data/passwd

# ACL: the API server may publish to any home-datacenter/ topic and
# subscribe to device telemetry/status. Other (device) clients should
# get their own ACL entries when they are added. Copied to
# /mosquitto/data/aclfile by the entrypoint for the same permission reason.
acl_file /mosquitto/data/aclfile

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type debug
