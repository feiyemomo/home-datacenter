# Frigate base config — home-api pushes camera definitions via
# PUT /api/config/save (requires SET_CONFIG_BY_API=true in the
# container environment). This file provides the global settings
# that home-api does NOT manage: MQTT, detectors, environment, and
# the go2rtc subsystem defaults (WebRTC candidates, HLS segment
# length, etc.).
#
# Camera entries are added/removed dynamically by home-api's
# FrigateClient.pushFrigateConfig(). Do NOT add cameras here —
# they will be overwritten on the next config push.

# ---- Hardware acceleration ----
#
# Frigate 0.17 AUTO-DETECTS /dev/dri and auto-enables preset-vaapi
# for its own ffmpeg REGARDLESS of whether the ffmpeg.hwaccel_args
# key is present in config.yml. Deleting frigate.db does NOT disable
# this auto-detection. The running ffmpeg command line confirms
# VAAPI is active: "-hwaccel vaapi -hwaccel_device /dev/dri/renderD128
# -hwaccel_output_format vaapi".
#
# On the J4125 (UHD Graphics 600, 12 EU, Gen 9.5) with a Hikvision
# HEVC main stream (Channels/101), VAAPI decode produces periodic
# non-fatal errors:
#   - "[rtsp] Multi-layer HEVC coding is not implemented"
#     (Hikvision uses SVC-like multi-layer HEVC; ffmpeg drops those
#      NALUs but continues decoding the base layer)
#   - "[hevc] Could not find ref with POC N"
#     (lost reference frames from the dropped NALUs)
#   - "[AVHWFramesContext] Failed to sync surface"
#     (VAAPI surface sync failure on the corrupted frame)
# These cause the watchdog to restart ffmpeg occasionally (a few
# times per hour), but between restarts the detection pipeline runs
# at 2 fps feed (detect.fps=2) / ~0.4-2.0 fps detection (Frigate's
# motion pre-filter means not every frame is sent to the detector).
# The recording pipeline (-c:v copy) is unaffected because it
# doesn't decode — recordings use the camera's native framerate.
#
# Verified working state (2026-07-18):
#   - detectors.ov: openvino CPU, num_threads=1, inference_speed ~43ms
#     (single-threaded is FASTER than multi-threaded on J4125 for
#     this lightweight model — thread sync overhead > parallelism gain)
#   - cameras.front_door: camera_fps=2.0, process_fps=2.0,
#     detection_fps=0.4-2.1, detection_enabled=true, skipped_fps=0.0
#   - Total Frigate container CPU: ~70-90% of one core
#   - ffmpeg running with VAAPI, stable between watchdog restarts
#
# To DISABLE VAAPI for Frigate's ffmpeg (force software decode):
#   1. Comment out the `devices: ["/dev/dri:/dev/dri"]` line in
#      compose.yaml — but this also disables VAAPI for go2rtc's live
#      transcode path, which IS needed for WebRTC.
#   2. OR keep /dev/dri mounted (for go2rtc) and accept the periodic
#      non-fatal HEVC decode errors (current state).
# Software decode at 2 fps is ~10-15% CPU on the J4125, which is
# acceptable for 1-2 cameras.
#
# The ffmpeg.hwaccel_args key below is intentionally commented out
# because Frigate's auto-detection overrides it anyway. Keeping it
# commented avoids confusion about whether it's the source of truth.
#
# ffmpeg:
#   hwaccel_args: preset-vaapi

mqtt:
  host: mosquitto
  topic_prefix: frigate
  # Frigate uses env var substitution {VAR} to read credentials from
  # the container environment. compose.yaml maps the .env file's
  # MQTT_USERNAME/MQTT_PASSWORD to FRIGATE_MQTT_USERNAME/
  # FRIGATE_MQTT_PASSWORD in the frigate container (the FRIGATE_
  # prefix is REQUIRED — frigate/config/env.py only reads env vars
  # starting with "FRIGATE_"). The ACL (deploy/mosquitto/aclfile)
  # grants the home-datacenter user readwrite on both
  # home-datacenter/# and frigate/# topics.
  #
  # NOTE: the values MUST be quoted. Without quotes, YAML parses
  # {FRIGATE_MQTT_USERNAME} as a flow mapping (dict) instead of a
  # string, causing Frigate's Pydantic validator to reject the entire
  # config.yml ("Input should be a valid string") and fall back to
  # safe mode (default cpu detector, mqtt disabled). With quotes,
  # YAML parses it as the string "{FRIGATE_MQTT_USERNAME}", and
  # Frigate's env var substitutor (str.format(**FRIGATE_ENV_VARS))
  # replaces it with the actual value.
  user: "{FRIGATE_MQTT_USERNAME}"
  password: "{FRIGATE_MQTT_PASSWORD}"
  # client_id: frigate

# Frigate's own authentication is enabled in PROXY MODE — the
# dashboard's nginx layer (home-web) already gates /frigate/ behind
# our JWT auth_request subrequest, so by the time a request reaches
# Frigate it has Remote-User / Remote-Role headers attached.
#
# We can't disable Frigate's nginx auth_request directive (it's
# hard-coded in /usr/local/nginx/conf/auth_request.conf and
# unconditional across every location). When auth.enabled is false,
# the auth subrequest goes to http://127.0.0.1:5001/auth which is
# NOT running → connection refused → 502 → 500 on every Frigate
# request (including Frigate's own healthcheck in
# docker-compose.yaml). The fix is to enable the auth service AND
# configure proxy auth, so the subrequest succeeds when
# Remote-User is present.
#
# Without `auth.enabled: true`:
#   * 127.0.0.1:5001 is not bound (the auth service never starts)
#   * every /frigate/ request 500s because the subrequest to /auth
#     hits a dead upstream
#   * Frigate's own /api/config healthcheck in compose.yaml 500s,
#     so the container is reported as unhealthy even though the
#     go2rtc subsystem is fine
#
# With `auth.enabled: true` and proxy mode:
#   * auth service starts on 127.0.0.1:5001
#   * /auth subrequest succeeds when Remote-User is present
#     (the proxy_auth path returns 200 with the user from headers)
#   * /auth subrequest 401s for unauthenticated requests (the
#     normal login flow), which is fine because nginx handles
#     the 401/500 cases separately
auth:
  enabled: true
proxy:
  # Map the headers nginx sends. The default_role is the role
  # Frigate assigns when no role header is present; we always
  # send role=admin from nginx so this is the fallback.
  header_map:
    user: Remote-User
    role: Remote-Role
  default_role: admin

# Detectors: OpenVINO CPU detector. The default `stable` Frigate
# image ships with the OpenVINO 2025.3.0 runtime + the SSDLite
# MobileNet v2 IR model (FP16) at /openvino-model/. OpenVINO's CPU
# backend uses Intel oneDNN + the IR format, which is significantly
# faster than the tflite CPU detector on Intel hardware (the tflite
# CPU detector is officially "not recommended" per Frigate docs —
# "in most cases OpenVINO can be used in CPU mode with better
# results").
#
# The model is SSDLite MobileNet v2 from Intel's Open Model Zoo,
# converted to FP16 precision IR. Input is 300x300 NHWC BGR.
# Labelmap is COCO 91-class (with background at index 0).
#
# Performance on J4125 (Celeron, 4 cores, UHD Graphics 600):
#   - num_threads=1: ~43ms per inference (faster than 4 threads —
#     thread sync overhead > parallelism benefit for this model)
#   - detect.fps=2 with 1 camera: ~70-90% of one CPU core total
#     (includes ffmpeg VAAPI decode + OpenVINO inference + go2rtc)
#
# To add a Google Coral TPU for 3+ cameras, see:
# https://docs.frigate.video/configuration/object_detectors/#edge-tpu-detector
detectors:
  ov:
    type: openvino
    device: CPU
    # Limit OpenVINO to a single inference thread. The J4125 has 4
    # cores; without this OpenVINO spawns threads across all of them,
    # causing CPU spikes during inference. With detect.fps=2, even a
    # single-threaded inference (~80-120ms) easily keeps up (2 fps ×
    # 120ms = 240ms/s = 24% of one core). The remaining 3 cores stay
    # free for ffmpeg VAAPI decode, go2rtc WebRTC transcode, and the
    # rest of the system.
    num_threads: 1
model:
  width: 300
  height: 300
  input_tensor: nhwc
  input_pixel_format: bgr
  path: /openvino-model/ssdlite_mobilenet_v2.xml
  labelmap_path: /openvino-model/coco_91cl_bkgr.txt

# go2rtc subsystem — bundled inside Frigate. These settings are
# the same as the old standalone go2rtc.yaml.
go2rtc:
  # webrtc.candidates: the ICE host candidates go2rtc advertises in
  # its SDP answer. 127.0.0.1:8555 is the loopback candidate that
  # works when the browser is on the same machine. For LAN access
  # from phones/tablets, add the host's LAN IP (or use STUN).
  #
  # v1.6.20: added NAS public IPv6 candidate for IPv6 P2P direct
  # connection. Both home and mobile networks are CGNAT (Symmetric
  # NAT) so IPv4 STUN srflx cannot punch through. But IPv6 has no
  # NAT — if both NAS and phone have IPv6 connectivity, WebRTC can
  # connect directly via the IPv6 host candidate.
  #
  # The IPv6 address is statically configured (STUN servers don't
  # support IPv6 AAAA, so go2rtc can't auto-reflect it). If the
  # ISP rotates the IPv6 prefix (DHCPv6-PD), update this value and
  # restart frigate. The address below is the NAS's SLAAC EUI-64
  # address (stable across reboots; only the /64 prefix rotates).
  # To find the current value: ssh fnos-momo@nas 'ip -6 addr show
  # enp4s0 | grep "scope global" | grep -v temporary'.
  webrtc:
    listen: :8555
    candidates:
      - 127.0.0.1:8555
      - 192.168.31.234:8555
      - "[2409:8a70:37a3:99d0:62be:b4ff:fe08:bd09]:8555"
  hls:
    # v1.6.19: ultra-low-latency HLS for remote (Cloudflare Tunnel)
    # viewing. segment=0.5s is the practical floor — 0.2s segments on
    # an 8 Mbps HEVC stream are only ~200KB each, and HTTP request
    # overhead (TLS handshake reuse + Cloudflare Tunnel TTFB ~1.4s)
    # dominates the per-segment cost. 0.5s yields ~500KB segments
    # that download in ~500ms over the tunnel, leaving headroom.
    # Combined with partial=true (LL-HLS) hls.js can begin playback
    # after the first partial segment (~167ms) instead of waiting
    # for a full segment, so end-to-end first-frame is ~2-3s on
    # remote vs the previous ~5-7s.
    segment: 0.5
    partial: true
    # v1.6.19: window 6 (3s of content) — smaller than v1.6.18's 8
    # because partial mode lets hls.js re-buffer from partials; a
    # large window just wastes playlist bandwidth on remote.
    window: 6

# Cameras section is managed by home-api. The empty dict here is
# a placeholder so Frigate boots without complaining about a
# missing cameras key; home-api replaces it on the first config push.
#
# IMPORTANT: the stream URL contains a `#video=h264#width=1280`
# directive. YAML treats an unquoted `#` as the start of a comment,
# so the value MUST be quoted — otherwise the transcode flags
# silently disappear and go2rtc falls back to the camera's native
# codec (H.265/HEVC + PCMA on Hikvision), which Chrome cannot
# decode for WebRTC and produces the SDP 502 "codecs not matched:
# video:H265, audio:PCMA" error. This is only relevant during the
# boot window before home-api's first pushFrigateConfig() (the
# JSON-encoded push is not subject to YAML's comment rules), but
# quoting here is the durable fix.
  streams:
    前门:
      ffmpeg:rtsp://admin:Haikangcam@192.168.31.100:554/Streaming/Channels/101#video=h264#width=1280#hardware=vaapi
cameras:
  front_door:
    name: front_door
    enabled: true
    ffmpeg:
      inputs:
        # Frigate's OWN ffmpeg path — plain RTSP without any `#`
        # directives. go2rtc-specific directives (#video=, #hardware=)
        # are silently ignored by Frigate's ffmpeg (treated as a URL
        # fragment). Frigate records the camera's NATIVE stream
        # (HEVC) with -c:v copy and decodes at 2 fps for detection.
        # See home-api's frigateCameraPath().
        - path:
            rtsp://admin:Haikangcam@192.168.31.100:554/Streaming/Channels/101
          roles:
            - detect
            - record
    detect:
      enabled: true
      fps: 2
    record:
      enabled: true

# Recording is enabled globally. home-api toggles per-camera
# record.enabled via PUT /api/config/set; the global block here
# sets the retention policy for all cameras that have recording
# enabled.
#
# IMPORTANT: Frigate 0.17 record schema:
#   - record.enabled: master switch for 24/7 continuous recording
#   - record.continuous.days: retain ALL footage for N days (24/7)
#   - record.motion.days: retain motion segments for N days
#   - record.alerts.retain.days/mode: keep alert segments
#   - record.detections.retain.days/mode: keep detection segments
# `record.retain` is NOT a valid key in Frigate 0.17 — the Pydantic
# validator rejects it as extra_forbidden, causing 400.
record:
  enabled: true
  continuous:
    days: 7
  motion:
    days: 7
snapshots:
  enabled: false
  retain:
    default: 14
    mode: motion

# Bird's-eye / multi-camera view (optional, disabled by default).
birdseye:
  enabled: false
  mode: continuous
version: 0.17-0
