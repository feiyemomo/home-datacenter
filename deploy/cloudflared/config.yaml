# Cloudflare Tunnel configuration.
#
# The tunnel ID and credentials file are mounted from the host's
# ~/.cloudflared directory (see compose.yaml volumes). This file
# defines the ingress rules that route public hostnames to the
# internal Docker services.
#
# Service names ("web", "api", "frigate") resolve on the home-net
# Docker bridge network — cloudflared joins that network so it can
# reach containers directly without going through the host's
# published ports.

tunnel: 663e45da-2140-4b42-8dbc-b65da7b5956a
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: dashboard.feiyemomo.top
    service: http://web:80

  - hostname: api.feiyemomo.top
    service: http://api:8080

  - hostname: cam.feiyemomo.top
    service: http://web:80

  - service: http_status:404
