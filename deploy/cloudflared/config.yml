# Cloudflare Tunnel configuration for Home Datacenter
#
# Two subdomains:
#   - dashboard.feiyemomo.top → Web Dashboard (nginx on port 80)
#   - api.feiyemomo.top       → API backend (Go on port 8080)

tunnel: <YOUR_TUNNEL_ID>
credentials-file: /etc/cloudflared/<YOUR_TUNNEL_ID>.json

ingress:
  # Web Dashboard → nginx (port 80)
  # nginx will internally proxy /api/ requests to the backend
  - hostname: dashboard.feiyemomo.top
    service: http://localhost:80

  # API direct access → Go backend (port 8080)
  # Optional: if you want direct API calls without going through nginx
  - hostname: api.feiyemomo.top
    service: http://localhost:8080

  # Catch-all: reject unmatched hostnames
  - service: http_status:404