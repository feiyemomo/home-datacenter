# coturn STUN/TURN for Home Datacenter.
#
# This is a minimal coturn config that:
#   - Listens on the standard 3478 (STUN/TURN) and 5349 (TLS) ports.
#   - Requires a shared-secret REST auth via the API at
#     https://api.feiyemomo.top/api/v1/turn/credential (TODO Phase 5+).
#     Until that endpoint exists, we fall back to a static user.
#   - Exposes its relay ports (49160-49200) on the home-net network.
#
# The CLI is `turnserver` from the coturn package. Most of the
# settings here are the upstream defaults — we only override the
# bits the home network cares about.

listening-port=3478
tls-listening-port=5349

# External/public IP — Cloudflare Tunnel can't proxy UDP, so coturn
# is reached directly. Replace with your real public IP / DDNS host.
external-ip=YOUR_PUBLIC_IP

# Realm & auth. Replace `staticuser` and `staticpass` with values
# you actually want to ship. For the home-Datacenter production
# setup, switch to `use-auth-secret` and let the API mint
# short-lived credentials.
realm=home-datacenter.local
user=staticuser:staticpass

# Relay ports.
min-port=49160
max-port=49200

# Recommended security defaults.
no-multicast-peers
no-cli
no-loopback-peers
no-tcp-relay
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255
