api:
  listen: ":1984"
  origin: "*"

log:
  level: debug
  output: stderr

webrtc:
  # Default config: ":8555" listens on TCP AND UDP. Splitting into
  # listen/udp is a 1.9.5 quirk: `listen: ":8555/tcp"` + `udp: ":8555"`
  # does NOT bind UDP on this build (verified via `netstat -tunlp`
  # inside the container — only 8555/tcp shows up). Reverting to the
  # shorthand form re-enables both transports.
  listen: ":8555"

hls:
  # Segment length controls the *minimum* time the browser waits
  # for the first playable frame: a 6s segment (the upstream
  # default) means the operator sees a spinner for 6s before any
  # frame is available to the decoder. Cameras at the home
  # network bitrate (~22 Mbps HEVC) are not bandwidth-bound on
  # the LAN, so we trade a tiny overhead for ~4s faster
  # time-to-first-frame. hls.js's buffer math (maxBufferLength
  # 12s, maxMaxBufferLength 30s) still works correctly with 2s
  # segments.
  segment: 2

  # Partial segments (also called "low-latency HLS" parts) further
  # reduce time-to-first-frame on the very first render. With
  # partial segments on, go2rtc splits each 2s segment into ~200ms
  # parts; the browser can start decoding the first part before
  # the segment is fully written. Negligible overhead at our
  # bitrates; large win on the "stuck loading" complaint.
  partial: true

  # Window is the number of segments listed in the media playlist
  # (live). 4 × 2s = 8s of forward-buffered segments is plenty for
  # hls.js to recover from a transient stall (e.g. 2-3s GC pause
  # in the home-api container) without forcing a playlist
  # refetch. Upstream default 3 would also work; 4 trades ~2s of
  # extra in-memory segment for fewer mid-playback rebuffers.
  window: 4
