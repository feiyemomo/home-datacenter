# nginx.conf for the Home Datacenter web SPA.
#
# - Serves the static React build from /usr/share/nginx/html
# - Proxies /api/ to the Go backend (service name: api, port 8080)
# - Upgrades /api/v1/ws to a WebSocket connection

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip text assets.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Static assets: cache aggressively, files are content-hashed by Vite.
    location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|ico|webmanifest)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API proxy.
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # go2rtc reverse proxy — serves /api/webrtc (SDP exchange) and
    # /api/stream.m3u8 (HLS) under the dashboard origin so the browser
    # can reach them without CORS. The API sets
    # camera.webrtc_public_base="/go2rtc" and the frontend builds
    # relative URLs from ice.webrtc_base. Same-origin → no preflight,
    # no "Failed to fetch".
    location /go2rtc/ {
        proxy_pass         http://home-go2rtc:1984/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # go2rtc streams can be long-lived (HLS chunked, WebRTC SDP
        # is short but WebSocket media may keep idle connections).
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # WebSocket upgrade for /api/v1/ws.
    location = /api/v1/ws {
        proxy_pass          http://api:8080;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
