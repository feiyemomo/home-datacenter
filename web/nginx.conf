# nginx.conf for the Home Datacenter web SPA.
#
# - Serves the static React build from /usr/share/nginx/html
# - Proxies /api/ to the Go backend (service name: api, port 8080)
# - Upgrades /api/v1/ws to a WebSocket connection

# Upstream keepalive: reuse TCP connections to the Go backend
# instead of opening a new one per request. On LAN the savings are
# small (~1ms), but on remote paths (IPv6 direct / Cloudflare Tunnel)
# each saved TCP handshake is one fewer RTT — meaningful on cellular
# where RTT can be 100-250ms.
#
# The `proxy_set_header Connection ""` in the /api/ location below
# is REQUIRED for keepalive to work: without it nginx sends
# `Connection: close` to the backend, which defeats the pool.
upstream api_backend {
    server api:8080;
    keepalive 32;
}

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip text assets.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Static assets: cache aggressively, files are content-hashed by Vite.
    location ~* \.(?:js|css|woff2?|ttf|png|jpg|jpeg|gif|svg|ico|webmanifest)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must NEVER be cached by the browser. Vite hashes
    # the JS/CSS bundle filenames, but index.html is the entry point
    # that references those hashes — if the browser serves a stale
    # index.html it will keep loading the old JS bundle and the
    # operator sees the old UI even after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for client-side routes.
    # no-cache is inherited from the = /index.html block above when
    # the fallback triggers (try_files internally rewrites to it).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API proxy.
    # proxy_buffering off is critical for video recording playback:
    # the /api/v1/cameras/:id/recordings/:recId/file endpoint serves
    # 30-60MB MP4 files via http.ServeFile (which supports Range
    # requests). With nginx's default proxy_buffering on, nginx
    # buffers the entire response to a temp file before sending a
    # single byte to the browser — this defeats the browser's native
    # Range-based streaming and forces the user to wait for the
    # whole file to download before playback can start. Turning
    # buffering off lets nginx forward bytes as they arrive from
    # the backend, so the <video> element can begin playback as
    # soon as the first moov+moof boxes are received.
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Frigate go2rtc reverse proxy — serves /api/webrtc (SDP exchange)
    # and /api/stream.m3u8 (HLS) under the dashboard origin so the
    # browser can reach them without CORS. The API sets
    # camera.webrtc_public_base="/go2rtc" and the frontend builds
    # relative URLs from ice.webrtc_base. Same-origin → no preflight,
    # no "Failed to fetch".
    #
    # Frigate bundles go2rtc internally on port 1984 — the same API
    # the old standalone go2rtc container exposed. The proxy target
    # is home-frigate:1984 (was home-go2rtc:1984).
    #
    # SECURITY: every request to /go2rtc/ is gated by auth_request
    # to /api/v1/auth/verify. Without this, anyone reaching
    # cam.feiyemomo.top can hit /go2rtc/api/streams and pull every
    # camera's live H.264/H.265 video + SDP — go2rtc itself has
    # no auth. The verify sub-request is a primary-key DB hit, so
    # it's cheap even on a busy dashboard.
    #
    # We pre-handle OPTIONS here because (a) the SDP POST is a
    # non-simple request (custom Authorization header) and would
    # otherwise require a preflight that go2rtc can't answer, and
    # (b) auth_request only fires on the real request, not on
    # OPTIONS, which keeps the preflight fast.
    location /go2rtc/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Max-Age' 600;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        auth_request /api/v1/auth/verify;
        auth_request_set $auth_user $upstream_http_x_auth_user;

        # Sub-request timeout for /api/v1/auth/verify uses the
        # default 60s. We do NOT set `auth_request_timeout 5s;`
        # here because the nginx:alpine image we depend on does
        # not include that directive (unknown directive error at
        # startup). The 60s cap is acceptable in practice because
        # home-api's /auth/verify handler drains the request body
        # in O(body-size) — typically <5ms — so the sub-request
        # completes well under any timeout.
        error_page 401 = @go2rtc_unauthorized;

        proxy_pass         http://home-frigate:1984/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # go2rtc streams can be long-lived (HLS chunked, WebRTC SDP
        # is short but WebSocket media may keep idle connections).
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;

        # Echo CORS headers on the real (post-auth) response so the
        # browser is happy with the custom Authorization header on
        # the SDP POST. go2rtc itself does NOT set these — without
        # this, the preflight is allowed but the real response
        # would be blocked by the browser as not having the right
        # Access-Control-Allow-Origin.
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
    }

    # Frigate web UI proxy — serves the Frigate dashboard (events,
    # recordings, live view with AI overlays) under /frigate/ so the
    # operator can access it through the same origin as the main
    # dashboard. Gated by the same auth_request as /go2rtc/.
    location /frigate/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Max-Age' 600;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        auth_request /api/v1/auth/verify;
        error_page 401 = @go2rtc_unauthorized;

        # Frigate runs in "proxy auth" mode (auth.enabled=false in
        # deploy/frigate/config.yml). It trusts Remote-User /
        # Remote-Role headers and treats every request as
        # authenticated. We hard-code role=admin so every
        # dashboard user gets Frigate admin rights without
        # re-authenticating. If you want a viewer/admin split,
        # make /api/v1/auth/verify echo the role as a response
        # header (X-Auth-Role) and replace the literal below.
        proxy_pass         http://home-frigate:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Remote-User       $remote_user;
        proxy_set_header   Remote-Role       "admin";
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # WebSocket upgrade for /api/v1/ws.
    location = /api/v1/ws {
        proxy_pass          http://api:8080;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Named location for the 401 emitted by /go2rtc/'s auth_request
    # sub-call. MUST live at server level (not inside /go2rtc/ —
    # see the comment near `error_page 401 = @go2rtc_unauthorized`
    # above for the two nginx rules that prevent nesting).
    # `internal` blocks external probing; the `= 401` rewrite in
    # /go2rtc/ is the only path that reaches this handler.
    location @go2rtc_unauthorized {
        internal;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'WWW-Authenticate' 'Bearer realm="home-datacenter"' always;
        default_type application/json;
        return 401 '{"code":401,"message":"unauthorized","data":null}';
    }
}
